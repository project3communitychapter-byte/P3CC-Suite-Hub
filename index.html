<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P3CC SUITE HUB</title>
    <style>
        :root { --gold: #d4af37; --bg-overlay: rgba(0, 0, 0, 0.7); }
        
        body { 
            /* Dito inilagay ang iyong background1.png */
            background: linear-gradient(var(--bg-overlay), var(--bg-overlay)), url('background1.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            min-height: 100vh;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        .header { 
            width: 100%; 
            text-align: center; 
            padding: 40px; 
            background: rgba(0,0,0,0.6); 
            border-bottom: 2px solid var(--gold); 
            backdrop-filter: blur(5px);
        }
        
        .clock { font-size: 3rem; color: var(--gold); font-weight: bold; margin-bottom: 5px; text-shadow: 2px 2px 4px black; }
        .date { font-size: 1.2rem; color: #ccc; margin-bottom: 10px; }
        
        .hub-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 25px; 
            width: 90%; 
            max-width: 1000px; 
            margin-top: 50px; 
        }
        
        .card { 
            background: rgba(0, 0, 0, 0.7); 
            padding: 40px; 
            border-radius: 20px; 
            text-align: center;
            border: 1px solid var(--gold); 
            transition: 0.4s; 
            text-decoration: none; 
            color: white;
            backdrop-filter: blur(10px);
        }
        
        .card:hover { 
            transform: translateY(-10px); 
            background: var(--gold); 
            color: black; 
            box-shadow: 0 0 20px var(--gold);
        }
        
        .card h2 { margin: 0; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="header">
        <div id="clock" class="clock">00:00:00 AM</div>
        <div id="date" class="date">--</div>
        <h1>P3CC SUITE HUB</h1>
    </div>

    <div class="hub-grid">
        <a href="https://project3communitychapter-byte.github.io/P3CC-DISASTER-RESPONSE-PORTAL/" class="card">
            <h2>🚨 Disaster Portal</h2>
        </a>
        <a href="#" class="card">
            <h2>📊 P3CC Analytics</h2>
        </a>
        <a href="#" class="card">
            <h2>📂 Records Management</h2>
        </a>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            // 12-hour format na may AM/PM
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            document.getElementById('date').innerText = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P3CC SUITE HUB</title>
    <style>
        :root { --gold: #d4af37; --bg-overlay: rgba(0, 0, 0, 0.7); }
        
        body { 
            background: linear-gradient(var(--bg-overlay), var(--bg-overlay)), url('background1.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            min-height: 100vh;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        .header { text-align: center; padding: 30px; }
        .logo { width: 150px; height: 150px; border-radius: 50%; border: 3px solid var(--gold); margin-bottom: 20px; }
        .clock { font-size: 3rem; color: var(--gold); font-weight: bold; }
        .date { font-size: 1.2rem; color: #ccc; margin-bottom: 20px; }
        
        .main-container { flex: 1; display: flex; align-items: center; justify-content: center; }
        
        /* Card na may portal logo */
        .card { 
            background: rgba(0, 0, 0, 0.7); 
            padding: 20px; 
            border-radius: 20px; 
            text-align: center;
            border: 1px solid var(--gold); 
            transition: 0.4s; 
            text-decoration: none; 
            color: white;
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .portal-img { width: 300px; height: auto; margin-bottom: 15px; border-radius: 10px; }
        
        .card:hover { transform: scale(1.05); background: var(--gold); color: black; box-shadow: 0 0 20px var(--gold); }
        
        footer { width: 100%; text-align: center; padding: 20px; background: rgba(0,0,0,0.8); border-top: 1px solid var(--gold); font-size: 0.9rem; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <img src="p3cc.png" alt="P3CC Logo" class="logo">
        <div id="clock" class="clock">00:00:00 PM</div>
        <div id="date" class="date">--</div>
        <h1>P3CC SUITE HUB</h1>
    </div>

    <div class="main-container">
        <!-- Dito pumasok ang iyong portal_2.jpg -->
        <a href="https://project3communitychapter-byte.github.io/P3CC-DISASTER-RESPONSE-PORTAL/" class="card">
            <img src="portal.png" alt="Disaster Portal" class="portal-img">
            <h2>DISASTER RESPONSE PORTAL</h2>
        </a>
    </div>

    <footer>
        <p style="font-style:italic;">"A TRISKELION is a brother unto his fellow TRISKELION."</p>
        <p>© 2026 P3CC SUITE HUB | System developed by Tol Ron "INSAN"</p>
    </footer>

    <script>
        function updateTime() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            document.getElementById('date').innerText = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
